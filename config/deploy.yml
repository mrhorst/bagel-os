# Kamal base config — the default (production) destination.
#
# Install-specific values (server IP, domain, registry, image) are read from
# environment variables so nothing identifiable lands in git. GitHub Actions
# supplies them from repo secrets; for local `kamal` ops, export the same vars.
#
# Deploy targets:
#   production (default) -> bin/kamal deploy             (this file only)
#   staging              -> bin/kamal deploy -d staging  (this file + deploy.staging.yml)
#
# Secrets resolve from .kamal/secrets-common plus .kamal/secrets (production)
# or .kamal/secrets.staging (staging). See deploy.staging.yml for the overrides
# that keep staging fully isolated from production on the same host.

service: restaurant-inventory-os

image: <%= ENV.fetch("KAMAL_IMAGE") %>

servers:
  web:
    - <%= ENV.fetch("KAMAL_SERVER_IP") %>

ssh:
  user: <%= ENV.fetch("KAMAL_SSH_USER", "root") %>
  keys:
    - <%= ENV.fetch("KAMAL_SSH_KEY_PATH", "~/.ssh/kamal_deploy_key") %>
  keys_only: true
<%- if ENV["KAMAL_SSH_CONFIG_PATH"].to_s.strip.present? -%>
  config: <%= ENV["KAMAL_SSH_CONFIG_PATH"] %>
<%- end -%>

proxy:
  ssl: true
  host: <%= ENV.fetch("KAMAL_APP_HOST") %>
  app_port: 3000

registry:
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  driver: docker
  provenance: false
  sbom: false

env:
  clear:
    APP_HOST: <%= ENV.fetch("KAMAL_APP_HOST") %>
    APP_PROTOCOL: https
    POSTGRES_HOST: restaurant-inventory-os-postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: restaurant_inventory_os_production
    POSTGRES_USER: restaurant_inventory_os
    RAILS_LOG_LEVEL: info
    RAILS_MAX_THREADS: 3
    SOLID_QUEUE_IN_PUMA: true
    # Error reporting to the self-hosted GlitchTip. Leave empty (or unset) to keep
    # Sentry inert; set to the internal DSN once GlitchTip is booted. See
    # config/deploy.glitchtip.yml and docs/deployment/observability.md.
    # SENTRY_DSN: http://<key>@glitchtip-web:8080/<project_id>
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - TASK_BRIEFING_AGENT_GATEWAY_TOKEN

volumes:
  - /var/lib/restaurant-inventory-os/storage:/rails/storage

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs
  create_admin: app exec --interactive --reuse "bin/rails admin:create"
  seed_demo: app exec --reuse "env SEED_DEMO_DATA=true bin/rails db:seed"

accessories:
  postgres:
    image: postgres:17
    host: <%= ENV.fetch("KAMAL_SERVER_IP") %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: restaurant_inventory_os_production
        POSTGRES_USER: restaurant_inventory_os
      secret:
        - POSTGRES_PASSWORD
    directories:
      - /var/lib/restaurant-inventory-os/postgres:/var/lib/postgresql/data
