# Kamal deploy configuration for GitHub Actions.
#
# This file intentionally reads install-specific values from environment
# variables so real server IPs, domains, and registry names stay out of git.

service: restaurant-inventory-os

image: <%= ENV.fetch("KAMAL_IMAGE") %>

servers:
  web:
    - <%= ENV.fetch("KAMAL_SERVER_IP") %>

ssh:
  user: <%= ENV.fetch("KAMAL_SSH_USER", "root") %>
  keys:
    - <%= ENV.fetch("KAMAL_SSH_KEY_PATH", "~/.ssh/kamal_deploy_key") %>
  keys_only: true

proxy:
  ssl: true
  host: <%= ENV.fetch("KAMAL_APP_HOST") %>
  app_port: 3000

registry:
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  driver: docker
  provenance: false
  sbom: false

env:
  clear:
    APP_HOST: <%= ENV.fetch("KAMAL_APP_HOST") %>
    APP_PROTOCOL: https
    POSTGRES_HOST: restaurant-inventory-os-postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: restaurant_inventory_os_production
    POSTGRES_USER: restaurant_inventory_os
    RAILS_LOG_LEVEL: info
    RAILS_MAX_THREADS: 3
    SOLID_QUEUE_IN_PUMA: true
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD

volumes:
  - /var/lib/restaurant-inventory-os/storage:/rails/storage

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs
  create_admin: app exec --interactive --reuse "bin/rails admin:create"

accessories:
  postgres:
    image: postgres:17
    host: <%= ENV.fetch("KAMAL_SERVER_IP") %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: restaurant_inventory_os_production
        POSTGRES_USER: restaurant_inventory_os
      secret:
        - POSTGRES_PASSWORD
    directories:
      - /var/lib/restaurant-inventory-os/postgres:/var/lib/postgresql/data
