# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  # Human attribute names for validation errors. Without these, Active Record
  # humanizes the raw column name ("Position", "Section type", "Value decimals",
  # "Fields") â€” but the Log Section form labels those same inputs differently
  # ("Sort order", "Input type", "Decimal places", "Inputs"). A failed save then
  # named a field the admin couldn't find on screen. Keep these in sync with the
  # labels in app/views/log_book_sections/_form.html.erb.
  activerecord:
    attributes:
      log_book_section:
        title: "Section label"
        section_type: "Input type"
        position: "Sort order"
        value_decimals: "Decimal places"
        fields: "Inputs"
      # Same rule for the task editor: a failed save humanized the raw columns
      # ("One time on", "Position", "Weekdays"), but the form labels them "Date",
      # "Sort order", and "Weekly days" â€” so the error named fields the manager
      # couldn't find. Keep these in sync with the labels in
      # app/views/tasks/manage/_task_form.html.erb and _guided_task_form.html.erb.
      task:
        title: "Task name"
        task_list_id: "Task list"
        recurrence_type: "Repeats"
        due_time: "Due time"
        one_time_on: "Date"
        starts_on: "Start date"
        ends_on: "End date"
        weekdays: "Weekly days"
        instructions: "Instructions"
        position: "Sort order"
        requires_photo_evidence: "Require one completion photo"
      # Same rule for the recipe editor: a failed save humanized the raw columns
      # ("Name", "Yield quantity"), but the form labels them "Recipe name" and
      # "Yield amount" â€” so e.g. entering a 0 yield returned "Yield quantity must
      # be greater than 0", naming a field the cook couldn't find on screen. Keep
      # these in sync with the labels in app/views/recipes/_form.html.erb.
      recipe:
        name: "Recipe name"
        yield_quantity: "Yield amount"
      # Same rule for the product editor: a failed save humanized the raw columns
      # ("Canonical name", "Each weight value", "Each weight unit"), but the form
      # labels them "Product name", "Average weight per unit", and "Weight unit" â€”
      # so a blank name returned "Canonical name can't be blank" and a half-filled
      # weight bridge returned "Each weight unit and the average weight must be
      # filled in together", each naming a field the reviewer couldn't find on
      # screen. Keep these in sync with the labels in
      # app/views/products/edit.html.erb.
      product:
        canonical_name: "Product name"
        each_weight_value: "Average weight per unit"
        each_weight_unit: "Weight unit"
