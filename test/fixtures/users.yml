<% password_digest = BCrypt::Password.create("password") %>

# Owner / admin — used by the default integration-test sign-in so every
# existing module-scoped test still passes through the authorization layer.
one:
  email_address: one@example.com
  password_digest: <%= password_digest %>
  role: 1
  owner: true

two:
  email_address: two@example.com
  password_digest: <%= password_digest %>
  role: 0
  owner: false
