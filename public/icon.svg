<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bagel">
  <defs>
    <radialGradient id="dough" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#E8B468"/>
      <stop offset="45%" stop-color="#D49A4A"/>
      <stop offset="100%" stop-color="#A96A28"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#9A5C24"/>
      <stop offset="100%" stop-color="#C98A40"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF4E7"/>
      <stop offset="100%" stop-color="#F4E7CF"/>
    </linearGradient>
  </defs>

  <!-- App background tile (iOS rounds the corners) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft contact shadow under the bagel -->
  <ellipse cx="256" cy="270" rx="172" ry="166" fill="#6B4A1F" opacity="0.12"/>

  <!-- Bagel body: outer disc minus the hole (even-odd donut) -->
  <path fill-rule="evenodd" fill="url(#dough)" stroke="#8C551F" stroke-width="3" stroke-opacity="0.45"
        d="M 256 84
           a 172 172 0 1 0 0.01 0 Z
           M 256 192
           a 64 64 0 1 1 -0.01 0 Z"/>

  <!-- Inner hole shading ring -->
  <circle cx="256" cy="256" r="64" fill="url(#hole)"/>
  <circle cx="256" cy="256" r="64" fill="none" stroke="#7A471A" stroke-width="3" stroke-opacity="0.4"/>

  <!-- Top glaze highlight -->
