<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bagel OS">
  <defs>
    <!-- Brand-orange field, derived from --accent oklch(0.57 0.17 50) -->
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2832D"/>
      <stop offset="52%" stop-color="#CA5B00"/>
      <stop offset="100%" stop-color="#9F3700"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Cream dough: lightest on the puffed mid-band, toasted at both rims -->
    <radialGradient id="dough" gradientUnits="userSpaceOnUse" cx="256" cy="248" r="170">
      <stop offset="34%" stop-color="#EFCE9E"/>
      <stop offset="46%" stop-color="#FDF2DC"/>
      <stop offset="66%" stop-color="#FFF8E9"/>
      <stop offset="88%" stop-color="#F6DDB4"/>
      <stop offset="100%" stop-color="#E9BE86"/>
    </radialGradient>

    <!-- Shadow the ring casts into its own hole -->
    <linearGradient id="holeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E2B00" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#6E2B00" stop-opacity="0"/>
    </linearGradient>

    <filter id="soften" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Full-bleed background (iOS masks the corners itself) -->
  <rect width="512" height="512" fill="url(#field)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Grounding shadow -->
  <path d="M256 108a160 160 0 1 0 0 320a160 160 0 1 0 0-320Z M256 196a72 72 0 1 1 0 144a72 72 0 1 1 0-144Z"
        transform="translate(0 18)" fill="#671F00" opacity="0.38" filter="url(#soften)"/>

  <!-- Shadow visible through the hole -->
  <circle cx="256" cy="252" r="62" fill="url(#holeShade)"/>

  <!-- Bagel ring (hole is a true cutout) -->
  <path fill-rule="evenodd" fill="url(#dough)"
        d="M256 88a164 164 0 1 0 0 328a164 164 0 1 0 0-328Z M256 190a64 64 0 1 1 0 128a64 64 0 1 1 0-128Z"/>

  <!-- Sesame seeds — few, large, toasted -->
  <g fill="#C97E37">
    <ellipse cx="256" cy="141" rx="15" ry="8.5" transform="rotate(-8 256 141)"/>
    <ellipse cx="352" cy="184" rx="15" ry="8.5" transform="rotate(38 352 184)"/>
    <ellipse cx="371" cy="290" rx="14" ry="8" transform="rotate(104 371 290)"/>
    <ellipse cx="302" cy="360" rx="15" ry="8.5" transform="rotate(150 302 360)"/>
    <ellipse cx="196" cy="352" rx="14" ry="8" transform="rotate(28 196 352)"/>
    <ellipse cx="145" cy="266" rx="15" ry="8.5" transform="rotate(78 145 266)"/>
    <ellipse cx="180" cy="172" rx="14" ry="8" transform="rotate(130 180 172)"/>
  </g>
</svg>
