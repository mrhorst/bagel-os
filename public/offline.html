<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Offline</title>
    <!--
      Served by the service worker when a navigation fails with no network.
      Fully self-contained — inline styles, no external assets — so it renders
      even when nothing else is cached. Tokens mirror app/assets/tailwind
      (surface, ink, accent, --radius-md, --shadow-e1) so it stays on-brand.

      Bagel OS deliberately does NOT serve stale inventory/price/task data
      offline: acting on a yesterday's stock level is worse than knowing you're
      offline. So this is an honest "reconnect to continue" screen, not a cached
      data view.
    -->
    <style>
      :root {
        --surface: oklch(0.972 0.008 80);
        --ink: oklch(0.22 0.02 230);
        --ink-muted: oklch(0.5 0.015 230);
        --line: oklch(0.9 0.008 80);
        --accent: oklch(0.62 0.155 42);
        --accent-fg: oklch(0.99 0.002 80);
        --radius-md: 10px;
        --shadow-e1: 0 1px 0 0 rgb(17 24 32 / 0.04), 0 1px 2px 0 rgb(17 24 32 / 0.04);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--surface);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-e1);
        max-width: 420px;
        width: 100%;
        padding: 32px 28px;
        text-align: center;
      }
      .glyph {
        width: 44px;
        height: 44px;
        margin: 0 auto 18px;
        color: var(--ink-muted);
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { color: var(--ink-muted); line-height: 1.5; margin: 0 0 22px; font-size: 0.95rem; }
      button {
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: var(--radius-md);
        background: var(--accent);
        color: var(--accent-fg);
        padding: 11px 22px;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <main class="card">
      <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1>You're offline</h1>
      <p>Bagel OS needs a connection to show live counts, prices, and tasks. Reconnect and try again.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
